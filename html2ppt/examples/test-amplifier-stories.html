<!DOCTYPE html>
<html>
<head>
<style>
body {
  width: 1280px;
  height: 720px;
  margin: 0;
  padding: 0;
  background: #000000;
  font-family: Arial, sans-serif;
  color: #ffffff;
}
</style>
</head>
<body>

<!-- Amplifier Stories format example -->
<div class="slide center">
  <div class="section-label">Test Presentation</div>
  <h1 class="headline big-text">HTML to PowerPoint</h1>
  <p class="subhead">Testing the converter</p>
</div>

<div class="slide">
  <h2 class="headline">Key Features</h2>
  <div class="thirds">
    <div class="card">
      <div class="card-title">Python-pptx</div>
      <div class="card-text">Clear API and accurate positioning</div>
    </div>
    <div class="card">
      <div class="card-title">No Browser</div>
      <div class="card-text">Direct HTML parsing, no overhead</div>
    </div>
    <div class="card">
      <div class="card-title">Customizable</div>
      <div class="card-text">Override colors to match your brand</div>
    </div>
  </div>
</div>

<div class="slide">
  <h2 class="headline">Statistics</h2>
  <div class="stat-grid">
    <div class="stat">
      <div class="stat-number">3x</div>
      <div class="stat-label">FASTER</div>
    </div>
    <div class="stat">
      <div class="stat-number">100%</div>
      <div class="stat-label">ACCURATE</div>
    </div>
    <div class="stat">
      <div class="stat-number">0</div>
      <div class="stat-label">HACKS</div>
    </div>
  </div>
</div>

</body>
</html>
