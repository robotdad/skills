<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 1280px;
  height: 720px;
  background: linear-gradient(45deg, #f093fb 0%, #f5576c 50%, #ffd140 100%);
  font-family: Arial, sans-serif;
}

.slide {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.stat-huge {
  font-size: 200px;
  color: white;
  font-family: Impact, Arial Black, sans-serif;
  text-shadow: 0 8px 16px rgba(0,0,0,0.3);
  line-height: 1;
  margin-bottom: 40px;
}

.stat-label {
  font-size: 48px;
  color: white;
  font-weight: bold;
  letter-spacing: 4px;
  text-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.content {
  max-width: 800px;
}
</style>
</head>
<body>

<div class="slide">
  <div class="content">
    <div class="stat-huge">350%</div>
    <div class="stat-label">GROWTH IN Q4</div>
  </div>
</div>

</body>
</html>
